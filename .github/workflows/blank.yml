name: Tag Push Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-github-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Push tag with GITHUB_TOKEN
        run: |
          TAG="github-token-test-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Test $TAG"
          git push origin "refs/tags/$TAG"

  test-app-token:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Push tag with GitHub App token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="app-token-test-${GITHUB_RUN_ID}"
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Test $TAG"
          git push "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git" \
            "refs/tags/$TAG"
